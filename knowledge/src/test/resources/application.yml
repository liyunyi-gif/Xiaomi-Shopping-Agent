# ============ knowledge 模块测试配置 ============
# 连业务库 xiaomi_agent（schema.sql 已建表）

spring:
  datasource:
    url: jdbc:postgresql://192.168.122.128:5432/xiaomi_agent
    username: ${POSTGRES_USERNAME:}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  ai:
    # PgVectorStore：禁用自动建表（避免污染业务库）；测试环境无 embedding key 时语义路降级返回空
    vectorstore:
      pgvector:
        initialize-schema: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.xiaomi.shopping.agent.knowledge: debug
    org.springframework.jdbc: warn

