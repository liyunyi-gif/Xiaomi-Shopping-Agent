# ============ 小米商城智能导购 Agent · bootstrap 配置 ============
# 骨架阶段配置，连接信息对齐 Docker 服务（详见项目记忆 project-tech-stack）

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: xiaomi-shopping-agent

  # ---------- PostgreSQL + pgvector ----------
  datasource:
    url: jdbc:postgresql://192.168.122.128:5432/xiaomi_agent
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # ---------- Redis（短期记忆 / 会话状态）----------
  data:
    redis:
      host: 192.168.122.128
      port: 6379
      # password: 按需填写
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  # ---------- Spring AI（通义 DashScope + pgvector + MCP Client）----------
  ai:
    dashscope:
      # API Key 从环境变量读取，禁止硬编码入库
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3

    # ---------- pgvector 向量存储（语义路）----------
    vectorstore:
      pgvector:
        # 维度待实测确认（架构.md 待确认项：1024 or 1536）
        dimensions: 1024
        distance-type: cosine_distance
        index-type: hnsw
        index-parameters:
          m: 16
          ef-construction: 64

    # ---------- MCP Client（Shopping 子节点经此接入 mcpserver）----------
    mcp:
      client:
        sse:
          connections:
            xiaomi-shopping:
              url: http://localhost:8090

# ---------- MyBatis-Plus ----------
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      table-prefix: t_
      id-type: assign_id

# ---------- 业务自定义参数（待实测标定，架构.md §待确认）----------
xiaomi:
  agent:
    # 质量判断阈值（架构.md §5，待实测标定）
    judge:
      relevance-threshold: 0.7
    # 重检上限（P7 克制原则，含首查共 3 次调用）
    retry:
      max-attempts: 2
    # 短期记忆窗口 N（最近轮数）
    memory:
      short-term-window: 10

logging:
  level:
    com.xiaomi.shopping.agent: debug
    org.springframework.ai: info
