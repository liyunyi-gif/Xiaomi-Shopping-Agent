# ============ 小米商城智能导购 Agent · bootstrap 配置 ============
# 通用配置可入库；API Key 等敏感配置放 application-local.yml（已 gitignore）或环境变量

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: xiaomi-shopping-agent

  # ---------- PostgreSQL + pgvector ----------
  datasource:
    url: jdbc:postgresql://192.168.122.128:5432/xiaomi_agent
    username: ${POSTGRES_USERNAME:}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # ---------- Redis（短期记忆 / 会话状态）----------
  data:
    redis:
      host: 192.168.122.128
      port: 6379
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  ai:
    # ---------- pgvector 向量存储（语义路）----------
    vectorstore:
      pgvector:
        # Qwen3-Embedding-8B dimensions=1024（已实测）
        dimensions: 1024
        distance-type: cosine_distance
        index-type: hnsw
        # 注意：正式环境由 schema.sql 管理 t_knowledge_vector，不让 PgVectorStore 自动创建默认 vector_store 表
        initialize-schema: false
        index-parameters:
          m: 16
          ef-construction: 64

    # ---------- MCP Client（Shopping 子节点经此接入 mcpserver）----------
    mcp:
      client:
        sse:
          connections:
            xiaomi-shopping:
              url: http://localhost:8090

# ---------- MyBatis-Plus ----------
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      table-prefix: t_
      id-type: assign_id

# ---------- 业务自定义参数（待实测标定，架构.md §待确认）----------
xiaomi:
  agent:
    # Chat：阿里云百炼 OpenAI 兼容端点。api-key 走 application-local.yml 或环境变量。
    chat:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${DASHSCOPE_API_KEY:}
      model: qwen-plus-2025-07-28

    # Embedding：硅基流动 Qwen3-Embedding-8B，dimensions=1024。api-key 走 application-local.yml 或环境变量。
    embedding:
      base-url: https://api.siliconflow.cn/v1
      api-key: ${SILICONFLOW_API_KEY:}
      model: Qwen/Qwen3-Embedding-8B
      dimensions: 1024

    # Rerank：硅基流动 Qwen3-Reranker-8B。外部模型失败时降级自研 WeightedReranker。
    rerank:
      enabled: true
      base-url: https://api.siliconflow.cn/v1
      api-key: ${SILICONFLOW_API_KEY:}
      model: Qwen/Qwen3-Reranker-8B
      retry: 1

    # 质量判断阈值（架构.md §5，待实测标定）
    judge:
      relevance-threshold: 0.7
    # 重检上限（P7 克制原则，含首查共 3 次调用）
    retry:
      max-attempts: 2
    # 短期记忆窗口 N（最近轮数）
    memory:
      short-term-window: 10
    # Knowledge 子节点参数
    knowledge:
      recall-topk: 20
      top-n-final: 5

logging:
  level:
    com.xiaomi.shopping.agent: debug
    org.springframework.ai: info
